<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Room Assignment Management</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>Boarding House</h2>

    <a href="admin-dashboard.html">
        🏠 Dashboard
    </a>
</div>

<div class="main-content">

    <h1>Room Assignment Management</h1>

    <div class="analytics-container">

        <div class="card">

            <h2 id="totalAssignments">
                0
            </h2>

            <p>Total Assignments</p>

        </div>

        <div class="card">

            <h2 id="occupiedBeds">
                0
            </h2>

            <p>Occupied Beds</p>

        </div>

        <div class="card">

            <h2 id="activeAssignments">
                0
            </h2>

            <p>Active Assignments</p>

        </div>

    </div>

    <div class="card">

        <h2>Assign Room to Tenant</h2>

        <form id="assignmentForm">

            <label>
                User ID
            </label>

            <input
            type="number"
            id="userId"
            placeholder="Enter User ID"
            required>

            <label>
                Room Name
            </label>

            <input
            type="text"
            id="roomName"
            placeholder="Enter Room Name"
            required>

            <label>
                Room Number
            </label>

            <input
            type="text"
            id="roomNumber"
            placeholder="Enter Room Number"
            required>

            <label>
                Bed Number
            </label>

            <input
            type="text"
            id="bedNumber"
            placeholder="Enter Bed Number"
            required>

            <button type="submit">
                Assign Room
            </button>

        </form>

    </div>

    <div class="card">

        <h2>Room Assignment Records</h2>

        <input
        type="text"
        id="searchAssignment"
        placeholder="🔍 Search User ID, Room, or Bed">

        <br><br>

        <table>

            <thead>

                <tr>

                    <th>User ID</th>
                    <th>Room</th>
                    <th>Room Number</th>
                    <th>Bed Number</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="assignmentTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/logger.js"></script>
<script src="js/auth.js"></script>
<script src="js/manage-room-assignments.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Maintenance Requests</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>Tenant Portal</h2>

    <a href="user-dashboard.html">
        🏠 Dashboard
    </a>

</div>

<div class="main-content">

    <h1>My Maintenance Requests</h1>

    <div class="analytics-container">

        <div class="card">

            <h2 id="totalRequests">
                0
            </h2>

            <p>Total Requests</p>

        </div>

        <div class="card">

            <h2 id="pendingRequests">
                0
            </h2>

            <p>Pending</p>

        </div>

        <div class="card">

            <h2 id="completedRequests">
                0
            </h2>

            <p>Completed</p>

        </div>

    </div>

    <div class="card">

        <h2>Maintenance History</h2>

        <table>

            <thead>

                <tr>

                    <th>Date</th>
                    <th>Issue</th>
                    <th>Description</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="maintenanceTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/logger.js"></script>
<script src="js/auth.js"></script>
<script src="js/my-maintenance.js"></script>

</body>

</html>

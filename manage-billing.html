<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Billing</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar">
    <h2>Boarding House</h2>
    <a href="admin-dashboard.html">
        🏠 Dashboard
    </a>
 
</div>
<div class="main-content">
    <h1>Billing Management</h1>
    <div class="analytics-container">
        <div class="card">
            <h2 id="totalBills">
                0
            </h2>
            <p>Total Bills</p>
        </div>
        <div class="card">
            <h2 id="totalAmount">
                ₱0
            </h2>
            <p>Total Billing Amount</p>
        </div>
    </div>
    <div class="card">
        <h2>Create New Bill</h2>
        <form id="billingForm">
            <label>
                User ID
            </label>
            <input
            type="number"
            id="userId"
            placeholder="Enter User ID"
            required>
            <label>
                Billing Month
            </label>
            <input
            type="text"
            id="month"
            placeholder="June 2026"
            required>
            <label>
                Amount
            </label>
            <input
            type="number"
            id="amount"
            placeholder="Enter Amount"
            required>
            <label>
                Due Date
            </label>
            <input
            type="date"
            id="dueDate"
            required>
            <button type="submit">
                Create Bill
            </button>
        </form>
    </div>
    <div class="card">
        <h2>Billing Records</h2>
        <table>
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Month</th>
                    <th>Amount</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="billingList">
            </tbody>
        </table>
    </div>
</div>
<script src="js/logger.js"></script>
<script src="js/auth.js"></script>
<script src="js/manage-billing.js"></script>
</body>
</html>

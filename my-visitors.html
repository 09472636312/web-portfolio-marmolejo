<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Visitors</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>Tenant Portal</h2>

    <a href="user-dashboard.html">
        🏠 Dashboard
    </a>
</div>

<div class="main-content">

    <h1>My Visitors</h1>

    <div class="analytics-container">

        <div class="card">

            <h2 id="totalVisitors">
                0
            </h2>

            <p>Total Visitors</p>

        </div>

        <div class="card">

            <h2 id="approvedVisitors">
                0
            </h2>

            <p>Approved Visitors</p>

        </div>

    </div>

    <div class="card">

        <h2>Visitor Records</h2>

        <table>

            <thead>

                <tr>

                    <th>Visitor</th>
                    <th>Relationship</th>
                    <th>Date</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="visitorTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/logger.js"></script>
<script src="js/auth.js"></script>
<script src="js/my-visitors.js"></script>

</body>

</html>

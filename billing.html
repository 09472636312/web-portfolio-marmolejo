<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Billing</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>Tenant Portal</h2>

    <a href="user-dashboard.html">
        🏠 Dashboard
    </a>
</div>

<div class="main-content">

    <h1>My Billing</h1>

    <div class="analytics-container">

        <div class="card">
            <h2 id="totalBills">0</h2>
            <p>Total Bills</p>
        </div>

        <div class="card">
            <h2 id="totalAmount">₱0</h2>
            <p>Total Amount</p>
        </div>

        <div class="card">
            <h2 id="paidBills">0</h2>
            <p>Paid Bills</p>
        </div>

        <div class="card">
            <h2 id="unpaidBills">0</h2>
            <p>Unpaid Bills</p>
        </div>

    </div>

    <div class="card">

        <h2>Billing Records</h2>

        <table>

            <thead>

                <tr>

                    <th>Month</th>
                    <th>Amount</th>
                    <th>Due Date</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="billingTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/logger.js"></script>
<script src="js/auth.js"></script>
<script src="js/billing.js"></script>

<script>

checkUser();

function logout(){

const currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"
)
);

if(currentUser){

if(typeof addLog === "function"){

addLog(
currentUser.fullname,
"Logged Out"
);

}

}

localStorage.removeItem(
"currentUser"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>

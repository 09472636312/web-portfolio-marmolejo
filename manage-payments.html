<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Payments</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>Boarding House</h2>

    <a href="admin-dashboard.html">
        🏠 Dashboard
    </a>
</div>

<div class="main-content">

    <h1>Manage Payments</h1>

    <div class="analytics-container">

        <div class="card">

            <h2 id="totalPayments">
                0
            </h2>

            <p>Total Payments</p>

        </div>

        <div class="card">

            <h2 id="totalRevenue">
                ₱0
            </h2>

            <p>Total Revenue</p>

        </div>

        <div class="card">

            <h2 id="pendingPayments">
                0
            </h2>

            <p>Pending Payments</p>

        </div>

        <div class="card">

            <h2 id="completedPayments">
                0
            </h2>

            <p>Completed Payments</p>

        </div>

    </div>

    <div class="card">

        <h2>Payment Records</h2>

        <input
        type="text"
        id="searchPayment"
        placeholder="🔍 Search Tenant or Method">

        <br><br>

        <table>

            <thead>

                <tr>

                    <th>Tenant</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Date</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="paymentsTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/logger.js"></script>
<script src="js/auth.js"></script>
<script src="js/manage-payments.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Rooms</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>Boarding House</h2>

    <a href="admin-dashboard.html">
        🏠 Dashboard
    </a>
</div>

<div class="main-content">

    <h1>Manage Rooms</h1>

    <div class="analytics-container">

        <div class="card">

            <h2 id="totalRooms">
                0
            </h2>

            <p>Total Rooms</p>

        </div>

        <div class="card">

            <h2 id="totalSlots">
                0
            </h2>

            <p>Total Available Slots</p>

        </div>

        <div class="card">

            <h2 id="occupiedRooms">
                0
            </h2>

            <p>Occupied Rooms</p>

        </div>

    </div>

    <div class="card">

        <h2>Add New Room</h2>

        <form id="roomForm">

            <label>
                Room Name
            </label>

            <input
            type="text"
            id="roomName"
            placeholder="Enter Room Name"
            required>

            <label>
                Monthly Price
            </label>

            <input
            type="number"
            id="roomPrice"
            placeholder="Enter Monthly Price"
            required>

            <label>
                Available Slots
            </label>

            <input
            type="number"
            id="roomSlots"
            placeholder="Enter Available Slots"
            required>

            <button type="submit">
                Add Room
            </button>

        </form>

    </div>

    <div class="card">

        <h2>Room List</h2>

        <input
        type="text"
        id="searchRoom"
        placeholder="🔍 Search Room">

        <br><br>

        <table>

            <thead>

                <tr>

                    <th>Room Name</th>
                    <th>Monthly Price</th>
                    <th>Available Slots</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="roomTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/logger.js"></script>
<script src="js/auth.js"></script>
<script src="js/rooms.js"></script>

</body>

</html>

<script src="js/rooms.js"></script>

</body>
</html>
